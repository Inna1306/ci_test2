name: CI

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v4 # Клонируем репозиторий
      - name: Use Node.js ${{ matrix.node-version }} # Устанавливаем Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - run: npm ci # Устанавливаем зависимости
      - run: npm run lint || true # Запускаем линтер
      - run: npm test # Запускаем тесты
